service: laravel-api-budget

provider:
  name: aws
  region: us-east-1
  runtime: provided.al2
  stage: production
  memorySize: 1024
  environment:
    APP_URL: https://api.mrqn-labs.com
    APP_ENV: local
    APP_DEBUG: true
    APP_KEY: ${ssm:/app-budget/APP_KEY}

    # Base de datos
    DB_CONNECTION: mysql
    DB_HOST: ${ssm:/app-budget/DB_HOST}
    DB_PORT: 4000
    DB_DATABASE: ${ssm:/app-budget/DB_DATABASE}
    DB_USERNAME: ${ssm:/app-budget/DB_USERNAME}
    DB_PASSWORD: ${ssm:/app-budget/DB_PASSWORD}

    # Queue
    QUEUE_CONNECTION: sqs
    SQS_QUEUE: ${construct:jobs.queueUrl}
    SQS_PREFIX: ''

    SESSION_DRIVER: cookie
    CACHE_DRIVER: array
    SESSION_DOMAIN: .mrqn-labs.com
    FRONTEND_URL: https://mrqn-labs.com
    SANCTUM_STATEFUL_DOMAINS: mrqn-labs.com,api.mrqn-labs.com
    MYSQL_ATTR_SSL_CA: /etc/pki/tls/certs/ca-bundle.crt
    GEMINI_API_KEY: ${ssm:/app-budget/API_KEY_GEMINI}

plugins:
  - ./vendor/bref/bref
  - serverless-domain-manager
  - serverless-lift
custom:
  customDomain:
    domainName: api.mrqn-labs.com
    basePath: ''
    stage: ${self:provider.stage}
    createRoute53Record: true
    apiType: http                   # Esto indica API Gateway v2 (HTTP API)
    certificateName: mrqn-labs.com
    endpointType: regional

functions:
  api:
    handler: public/index.php
    description: 'Laravel API Budget'
    timeout: 28
    layers:
      - ${bref:layer.php-82-fpm}
    events:
      # CORREGIDO: Usamos httpApi para coincidir con apiType: http
      - httpApi: '*'
      # Esta es la función que ejecuta comandos de artisan
#    console:
#      handler: artisan
#      layers:
#        - ${bref:layer.php-82} # O la versión que uses
#      events:
#        - schedule:
#            rate: rate(1 minute)
#            input: '"schedule:run"'
constructs:
  # Aquí nace el Worker
  jobs:
    type: queue
    worker:
      # Usa el handler oficial de Bref para Laravel
      # ¡No necesitas crear un archivo worker.php manual!
      handler: Bref\LaravelBridge\Queue\QueueHandler
      runtime: php-82
      timeout: 60 # Dale 60s para que Gemini piense tranquilo
package:
  exclude:
    - node_modules/**
    - public/storage
    - resources/assets/**
    - storage/**
    - tests/**
    - .env
